<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>315 ALLSTARS</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/bg.css">
    <link rel="stylesheet" href="css/page2.css">
    <link rel="stylesheet" href="css/toolPanel.css">
    <style>
        h1 #title {
            color: #0fbe94;
            text-shadow: #0fbe94 0 0 15px;
        }

        h1 #title::after {
            background: linear-gradient(90deg, transparent, #0fbe94, transparent);
        }

        #barChartBtns,
        #distBtns {
            gap: 60px;
        }

        #imasRed:hover,
        #imasRed.active {
            background-color: #EB313A;
            color: #fefefe;
            box-shadow: 0 0 12px #EB313A;
        }

        #imasBlue:hover,
        #imasBlue.active {
            background-color: #2EBAE5;
            color: #fefefe;
            box-shadow: 0 0 12px #2EBAE5;
        }

        #imasYellow:hover,
        #imasYellow.active {
            background-color: #E7C224;
            color: #fefefe;
            box-shadow: 0 0 12px #E7C224;
        }
    </style>
</head>

<body>
    <div id="js-opening-top" class="opening-top"></div>
    <img src="assets/img/GS_ALL.webp" alt="" id="bg" />
    <div id="bodyContainer">
        <h1><button id="title">315 ALLSTARS</button></h1>

        <div class="legend">
            <span class="legend-item"><span class="legend-color" style="background:#EB313A"></span>Physical</span>
            <span class="legend-item"><span class="legend-color" style="background:#2EBAE5"></span>Intelli</span>
            <span class="legend-item"><span class="legend-color" style="background:#E7C224"></span>Mental</span>
        </div>

        <div id="chartWrapper">
            <div id="modeToggle">
                <button id="btn-radar" class="active">总体</button>
                <button id="btn-value">数值</button>
                <button id="btn-ratio">占比</button>
            </div>
            <div id="radarMode">
                <div id="radarChart"></div>
            </div>
            <div id="valueMode">
                <div id="barChartContainer">
                    <div id="barChartBtns">
                        <button data-field="age" class="active">年龄</button>
                        <button data-field="height">身高</button>
                        <button data-field="weight">体重</button>
                        <button data-field="shoe_size">鞋码</button>
                        <button data-field="bmi">BMI</button>
                    </div>
                    <div id="barChart"></div>
                    <div id="barChartStaticBtns">
                        <button id="btn-mean" class="active">平均值</button>
                        <button id="btn-med">中值</button>
                    </div>
                </div>
            </div>
            <div id="ratioMode">
                <div id="pieChartContainer">
                    <div id="distBtns">
                        <button data-dist="age" class="active">年龄</button>
                        <button data-dist="height">身高</button>
                        <button data-dist="weight">体重</button>
                        <button data-dist="shoe_size">鞋码</button>
                        <button data-dist="hand">惯用手</button>
                        <button data-dist="blood">血型</button>
                        <button data-dist="home">出身地</button>
                    </div>
                    <div id="distChart"></div>
                    <div id="prodBtns">
                        <button data-type="Physical" id="imasRed">Physical</button>
                        <button data-type="Intelli" id="imasBlue">Intelli</button>
                        <button data-type="Mental" id="imasYellow">Mental</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/opening.js"></script>
    <script src="js/title.js"></script>
    <script src="js/echarts.min.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/chartConfig.js"></script>
    <script>
        window.BRANCH_CONFIG = {
            prodKey: 'SideM',
            seriesName: '315 ALLSTARS',
            seriesColor: '#0fbe94',
            types: ['Physical', 'Intelli', 'Mental'],
            colors: { Physical: '#EB313A', Intelli: '#2EBAE5', Mental: '#E7C224' },
            dims: ['age', 'height', 'weight', 'shoe_size'],
            radarIndicator: [
                { name: '年龄', min: 15, max: 21 },
                { name: '身高(cm)', min: 155, max: 175 },
                { name: '体重(kg)', min: 45, max: 60 },
                { name: '鞋码(cm)', min: 24, max: 26 }
            ],
            barMins: { age: 18, height: 168, weight: 55, bmi: 18, shoe_size: 24 },
            distBuckets: {
                age: [
                    ['≤12岁', function (a) { return a <= 12; }],
                    ['13-18岁', function (a) { return a > 12 && a <= 18; }],
                    ['19-24岁', function (a) { return a > 18 && a <= 24; }],
                    ['25-29岁', function (a) { return a > 24 && a <= 29; }],
                    ['≥30岁', function (a) { return a > 29; }]
                ],
                height: [
                    ['≤149cm', function (h) { return h <= 149; }],
                    ['150-159cm', function (h) { return h > 149 && h <= 159; }],
                    ['160-169cm', function (h) { return h > 159 && h <= 169; }],
                    ['170-179cm', function (h) { return h > 169 && h <= 179; }],
                    ['≥180cm', function (h) { return h > 179; }]
                ],
                weight: [
                    ['≤39kg', function (w) { return w <= 39; }],
                    ['40-49kg', function (w) { return w > 39 && w <= 49; }],
                    ['50-59kg', function (w) { return w > 49 && w <= 59; }],
                    ['60-69kg', function (w) { return w > 59 && w <= 69; }],
                    ['≥70kg', function (w) { return w > 69; }]
                ]
            }
        };
    </script>
    <script src="js/branchPage.js"></script>
    <script src="js/clickEffect.js"></script>
    <script src="js/toolPanel.js"></script>
    <script src="js/gsap.min.js"></script>
    <script src="js/loading.js"></script>
</body>

</html>
