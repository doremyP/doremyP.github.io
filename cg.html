<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINDERELLA GIRLS</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/bg.css">
    <link rel="stylesheet" href="css/page2.css">
    <link rel="stylesheet" href="css/toolPanel.css">
    <style>
        h1 #title {
            color: #2681c8;
            text-shadow: #2681c8 0 0 15px;
        }

        h1 #title::after {
            background: linear-gradient(90deg, transparent, #2681c8, transparent);
        }

        #imasRed:hover,
        #imasRed.active {
            background-color: #ef2782;
            color: #fefefe;
            box-shadow: 0 0 12px #ef2782;
        }

        #imasBlue:hover,
        #imasBlue.active {
            background-color: #006aff;
            color: #fefefe;
            box-shadow: 0 0 12px #006aff;
        }

        #imasYellow:hover,
        #imasYellow.active {
            background-color: #f49207;
            color: #fefefe;
            box-shadow: 0 0 12px #f49207;
        }
    </style>
</head>

<body>
    <div id="js-opening-top" class="opening-top"></div>
    <script>
        (function () {
            var isMobile = window.innerWidth <= 750;
            var el;
            if (isMobile) {
                el = document.createElement('video');
                el.src = 'assets/img/bg_sp.webm';
                el.autoplay = true;
                el.loop = true;
                el.muted = true;
                el.playsInline = true;
            } else if (Math.random() < 0.5) {
                el = document.createElement('video');
                el.src = 'assets/img/bg_pc.webm';
                el.autoplay = true;
                el.loop = true;
                el.muted = true;
                el.playsInline = true;
            } else {
                el = document.createElement('img');
                el.src = 'assets/img/cgbg.jpg';
            }
            el.id = 'bg';
            document.body.appendChild(el);
        })();
    </script>
    <div id="bodyContainer">
        <h1><button id="title">CINDERELLA GIRLS</button></h1>

        <div class="legend">
            <span class="legend-item"><span class="legend-color" style="background:#ef2782"></span>Cute</span>
            <span class="legend-item"><span class="legend-color" style="background:#006aff"></span>Cool</span>
            <span class="legend-item"><span class="legend-color" style="background:#f49207"></span>Passion</span>
        </div>

        <div id="chartWrapper">
            <div id="modeToggle">
                <button id="btn-radar" class="active">总体</button>
                <button id="btn-value">数值</button>
                <button id="btn-ratio">占比</button>
            </div>
            <div id="radarMode">
                <div id="radarChart"></div>
            </div>
            <div id="valueMode">
                <div id="barChartContainer">
                    <div id="barChartBtns">
                        <button data-field="age" class="active">年龄</button>
                        <button data-field="height">身高</button>
                        <button data-field="weight">体重</button>
                        <button data-field="bust">胸围</button>
                        <button data-field="waist">腰围</button>
                        <button data-field="hip">臀围</button>
                        <button data-field="bmi">BMI</button>
                    </div>
                    <div id="barChart"></div>
                    <div id="barChartStaticBtns">
                        <button id="btn-mean" class="active">平均值</button>
                        <button id="btn-med">中值</button>
                    </div>
                </div>
            </div>
            <div id="ratioMode">
                <div id="pieChartContainer">
                    <div id="distBtns">
                        <button data-dist="age" class="active">年龄</button>
                        <button data-dist="height">身高</button>
                        <button data-dist="weight">体重</button>
                        <button data-dist="bust">胸围</button>
                        <button data-dist="waist">腰围</button>
                        <button data-dist="hip">臀围</button>
                        <button data-dist="hand">惯用手</button>
                        <button data-dist="blood">血型</button>
                        <button data-dist="home">出身地</button>
                    </div>
                    <div id="distChart"></div>
                    <div id="prodBtns">
                        <button data-type="Cute" id="imasRed">Cute</button>
                        <button data-type="Cool" id="imasBlue">Cool</button>
                        <button data-type="Passion" id="imasYellow">Passion</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/opening.js"></script>
    <script src="js/title.js"></script>
    <script src="js/echarts.min.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/chartConfig.js"></script>
    <script>
        window.BRANCH_CONFIG = {
            prodKey: 'CINDERELLA GIRLS',
            seriesName: 'CINDERELLA GIRLS',
            seriesColor: '#2681c8',
            types: ['Cute', 'Cool', 'Passion'],
            colors: { Cute: '#ef2782', Cool: '#006aff', Passion: '#f49207' },
            dims: ['age', 'height', 'weight', 'bust', 'waist', 'hip'],
            radarIndicator: [
                { name: '年龄', min: 15, max: 17.5 },
                { name: '身高(cm)', min: 155, max: 160.5 },
                { name: '体重(kg)', min: 40, max: 48.5 },
                { name: '胸围(cm)', min: 79, max: 82 },
                { name: '腰围(cm)', min: 53, max: 57 },
                { name: '臀围(cm)', min: 78, max: 83 }
            ],
            barMins: { age: 15, height: 152, weight: 41, bust: 76, waist: 54, hip: 79, bmi: 16 }
        };
    </script>
    <script src="js/branchPage.js"></script>
    <script src="js/clickEffect.js"></script>
    <script src="js/toolPanel.js"></script>
    <script src="js/gsap.min.js"></script>
    <script src="js/loading.js"></script>
</body>

</html>
