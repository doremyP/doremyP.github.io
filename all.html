<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>これからも、アイドル!!!!!!</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/bg.css">
    <link rel="stylesheet" href="css/all.css">
    <link rel="stylesheet" href="css/toolPanel.css">
    <style>
        body {
            background: #0d0203 url(assets/img/bgAll.png) top center repeat-y;
            background-size: 100vw;
        }
    </style>
</head>

<body>
    <div id="js-opening-top" class="opening-top"></div>
    <div id="bodyContainer">
        <div id="side-buttons">
            <button id="go-up" title="回到顶部" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                    <path fill="#fff"
                        d="M214.6 41.4c-12.5-12.5-32.8-12.5-45.3 0l-160 160c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L160 141.2 160 448c0 17.7 14.3 32 32 32s32-14.3 32-32l0-306.7L329.4 246.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-160-160z" />
                </svg><span id="percent"></span>
            </button>
            <button id="go-down" title="直达底部"
                onclick="window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                    <path fill="#fff"
                        d="M169.4 470.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 370.8 224 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 306.7L54.6 265.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z" />
                </svg>
            </button>
        </div>
        <h1><button id="title">角色一览</button></h1>
        <div id="typing">
            <span id="typing-front"></span><span id="typing-intermark"></span><span id="typing-internal"></span><span
                id="typing-rear"></span><span id="ex-mark"><span id="ex-mark1"></span><span id="ex-mark2"></span><span
                    id="ex-mark3"></span><span id="ex-mark4"></span><span id="ex-mark5"></span><span
                    id="ex-mark6"></span></span><span id="typing-mark"></span>
        </div>
        <div id="filter-container"></div>
        <div id="card-container"></div>
        <div id="pagination" class="pagination-wrapper"></div>
        <div id="modal">
            <div class="modal-wrap">
                <div class="dialog">
                    <div id="detail-content"></div>
                </div>
                <div class="close">
                    <img src="assets/img/icon_close.png" alt="关闭" class="close-off">
                    <img src="assets/img/icon_close_h.png" alt="关闭" class="close-hover">
                </div>
            </div>
        </div>
    </div>

    <script src="js/opening.js"></script>
    <script src="js/scroll.js"></script>
    <script src="js/echarts.min.js"></script>
    <script src="js/reminder.js"></script>
    <script src="js/clickEffect.js"></script>
    <script src="js/toolPanel.js"></script>
    <script src="js/allPage.js"></script>
    <script src="js/gsap.min.js"></script>
    <script src="js/loading.js"></script>
</body>

</html>
